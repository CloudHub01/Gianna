<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design.css">
</head>
<body>
    <header>
        <h1>To the most beautiful girl</h1>
    </header>
    <main>
        <p>Happy birthday, Gianna! I know we've only been talking for a few days and we're still getting to know each other, but my wish for you is to stay strong no matter what challenges life throws your way. Just remember, you'll never be alone. Happy birthday, pretty girl!</p>
    </main>
    
    <button id="friesBtn" class="fries-button">Click for Fries!</button>
    
    <div id="friesContainer" class="fries-container"></div>

    <div id="popupContainer" class="popup-container">
        <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcjdzeDNpN29tOHlna3NjaDliNHB6NWZqZjNqZ2ZoYWxzcXZndHp5dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/nNfRs2Unc5VxI3VnQB/giphy.gif" alt="popup">
    </div>

    <script>
        // Popup timer
        setTimeout(() => {
            const popup = document.getElementById('popupContainer');
            popup.classList.add('show');
        }, 10000);
        
        // Popup close when clicked
        document.getElementById('popupContainer').addEventListener('click', function() {
            this.classList.remove('show');
        });

        const friesBtn = document.getElementById('friesBtn');
        const friesContainer = document.getElementById('friesContainer');
        let clickCount = 0;

        friesBtn.addEventListener('click', function() {
            clickCount++;
            
            // Create falling fries
            const fry = document.createElement('img');
            fry.className = 'fry';
            fry.src = 'https://png.pngtree.com/png-clipart/20220429/original/pngtree-french-fries-vector-cartoon-illustration-png-image_7579343.png';
            fry.style.left = Math.random() * 90 + '%';
            friesContainer.appendChild(fry);

            setTimeout(() => {
                fry.remove();
            }, 3000);
            
            // Create or move the side gif
            if (clickCount === 1) {
                const sideGif = document.createElement('img');
                sideGif.className = 'fry-moving';
                sideGif.id = 'moving-gif';
                sideGif.src = 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYXFtYXRxN3A3NXRwYXRlcTRteHU5b3pneWNpcDZzamRqYm1wNnowOSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/MqfYhMK7vCKDZWCnlq/giphy.gif';
                sideGif.style.width = '80px';
                sideGif.style.height = '80px';
                friesContainer.appendChild(sideGif);
                moveGif();
            } else {
                const existingGif = document.getElementById('moving-gif');
                if (existingGif) {
                    moveGif();
                }
            }
            
            function moveGif() {
                const gif = document.getElementById('moving-gif');
                if (gif) {
                    const randomX = Math.random() * (window.innerWidth - 100);
                    const randomY = Math.random() * (window.innerHeight - 100);
                    gif.style.left = randomX + 'px';
                    gif.style.top = randomY + 'px';
                    gif.style.animation = 'moveIn 0.5s ease-out';
                }
            }
        });
    </script>
</body>
